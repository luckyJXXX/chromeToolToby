<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toby - 浏览器效率工具</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 顶部栏 -->
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="#4F46E5"/>
          <path d="M7 8h10M7 12h10M7 16h6" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="title">Toby</span>
      </div>
      <button class="settings-btn" id="settingsBtn" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
      </button>
    </header>

    <!-- 标签切换 -->
    <nav class="tabs">
      <button class="tab active" data-tab="tabs">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 3v18M3 9h6"/>
        </svg>
        <span>标签页</span>
      </button>
      <button class="tab" data-tab="favorites">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
        <span>收藏</span>
      </button>
      <button class="tab" data-tab="history">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <span>历史</span>
      </button>
    </nav>

    <!-- 主内容区 -->
    <main class="content">
      <!-- 标签页列表 -->
      <div class="tab-content active" id="tabs-content">
        <div class="content-header">
          <span class="tab-count" id="tabCount">0 个标签页</span>
          <div class="group-options">
            <button class="group-btn active" data-group="domain">按域名</button>
            <button class="group-btn" data-group="title">按标题</button>
          </div>
        </div>
        <div class="list-container" id="tabsList">
          <!-- 标签页列表将通过 JS 动态生成 -->
          <div class="loading">加载中...</div>
        </div>
      </div>

      <!-- 收藏列表 -->
      <div class="tab-content" id="favorites-content">
        <div class="content-header">
          <span class="tab-count" id="favCount">0 个收藏</span>
          <input type="text" class="search-input" id="favSearch" placeholder="搜索收藏...">
        </div>
        <div class="list-container" id="favoritesList">
          <div class="loading">加载中...</div>
        </div>
      </div>

      <!-- 历史记录 -->
      <div class="tab-content" id="history-content">
        <div class="content-header">
          <span class="tab-count" id="historyCount">0 条记录</span>
          <button class="clear-btn" id="clearHistory">清空</button>
        </div>
        <div class="list-container" id="historyList">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </main>

    <!-- 底部操作栏 -->
    <footer class="footer">
      <button class="action-btn" id="organizeBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        整理
      </button>
      <button class="action-btn primary" id="favoriteCurrentBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
        收藏当前
      </button>
      <button class="action-btn" id="exportBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
        导出
      </button>
    </footer>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
      <h3>设置</h3>
      <div class="setting-item">
        <label>
          <input type="checkbox" id="autoGroupSetting">
          自动按域名分组标签页
        </label>
      </div>
      <div class="setting-item">
        <label>最大历史记录数</label>
        <select id="maxHistorySetting">
          <option value="100">100</option>
          <option value="500" selected>500</option>
          <option value="1000">1000</option>
        </select>
      </div>
      <div class="setting-actions">
        <button class="action-btn" id="importBtn">导入数据</button>
        <button class="action-btn danger" id="clearAllBtn">清空所有数据</button>
      </div>
      <button class="close-settings" id="closeSettings">关闭</button>
    </div>

    <!-- 遮罩层 -->
    <div class="overlay" id="overlay"></div>
  </div>

  <script src="../lib/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
